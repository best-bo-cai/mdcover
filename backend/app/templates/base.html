<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Markdown Document</title>
  <style>
    {{ font_family_css|safe }}

    :root {
      color-scheme: light;
    }

    body {
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.7;
      color: #1f2328;
      max-width: 860px;
      margin: 0 auto;
      padding: 32px;
      word-break: break-word;
      background: #ffffff;
    }

    h1, h2, h3, h4, h5, h6 {
      color: #0f172a;
      margin-top: 1.2em;
      margin-bottom: 0.6em;
      line-height: 1.35;
    }

    p {
      margin: 0.7em 0;
    }

    a {
      color: #0b65d8;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    blockquote {
      margin: 1em 0;
      padding: 0.6em 1em;
      border-left: 4px solid #d0d7de;
      color: #57606a;
      background: #f6f8fa;
    }

    ul, ol {
      padding-left: 1.6em;
    }

    code {
      background: #f6f8fa;
      padding: 0.15em 0.4em;
      border-radius: 4px;
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
      font-size: 0.92em;
    }

    pre {
      background-color: #f6f8fa;
      padding: 1em;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1em 0;
    }

    pre code {
      background: transparent;
      padding: 0;
      border-radius: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1em 0;
      font-size: 0.95em;
    }

    table th,
    table td {
      border: 1px solid #d0d7de;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }

    table thead {
      background: #f6f8fa;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    hr {
      border: none;
      border-top: 1px solid #d0d7de;
      margin: 24px 0;
    }

    @page {
      size: A4;
      margin: 2cm 2.5cm;
      @bottom-center {
        content: counter(page);
      }
    }

    table, pre, figure {
      break-inside: avoid;
    }

    @media print {
      body {
        max-width: none;
        padding: 0;
      }
    }
  </style>
</head>
<body>
  <main>
    {{ content_html | safe }}
  </main>
</body>
</html>
